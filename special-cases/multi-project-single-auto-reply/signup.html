<html>

<!--

	This is an example registration form.

    Shown here is the usage of javascript to submit the form
    to a local backend for relaying to Lasso

    The ajax request can be removed and regular form submission
    can be used in its place.
    
    Please keep the ClientID, ProjectID, and LassoUID private;
    do not include these as hidden fields on the form.

-->

<head>
<title>Multi-project Sign Up</title>
    
<style type="text/css">
table{
	font-family:Verdana, Geneva, sans-serif;
	font-size:10pt;
}
div#errorContainer{
	margin-bottom: 1em;
	display: none;
}
.error{
	color: #ff0000;
	font-size: 10pt;
	display: block;
}
</style>
    
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.0/jquery.js"></script>
<script src="https://ajax.microsoft.com/ajax/jquery/jquery-1.3.2.min.js" type="text/javascript"></script>
<script src="https://ajax.microsoft.com/ajax/jquery.validate/1.5.5/jquery.validate.min.js" type="text/javascript"></script>
    
<script type="text/javascript">
<!-- Validates required fields -->
$(document).ready(function(){
	$("#lassoSignupForm").validate({
		errorLabelContainer: $('#errorContainer'),
		errorClass: 'error',
		rules:{
			FirstName: "required",
			LastName: "required",
			"Email": { required: true, email: true },
			"Phone": "required",
			"ProjectID[]": "required"
		},
		messages:{
			FirstName: "Please enter a first name",
			LastName: "Please enter a last name",
			"Email": "Please enter an e-mail address",
			"Phone": "Please enter a telephone number",
			"ProjectID[]": "Please select a project"
		},
		submitHandler: function(form){
			return register();
		}
	});
	<!-- Passes information to the PHP file and re-directs to the Thank You page -->
	$('#register').click(function(){
		$('#lassoSignupForm').submit();
		return false;
	});
	function register(){
		jQuery.ajax({
			type: "POST",
			url: 'signup.php',
			data: $('#lassoSignupForm').serializeArray(),
			success: function(data, status, jqxhr){
				console.log(data);
				window.location='https://www.lassonewhomes.com/bbhomes/single/wp-content/uploads/sample-forms/bbh-thankyou.html';
			},
			error: function(jqxhr,status,err){
				console.log(err);
			}
		});
		return false;
	}
});
</script>
</head>

<body>
<table align="center" cellpadding="0" cellspacing="0"><tr><td>
	<form id="lassoSignupForm">
    	<input type="hidden" name="guid" />
    	<p style="font-size:14pt;"><b>Multi-project Sign Up</b></p>
        <p><i>Submits to BBH - Cradle Bay, BBH - Silent Hill, and/or<br />Best Builder Homes OSC, based on selected projects</i></p>
        <p>&nbsp;</p>
        <p>
        	<label>First Name*:</label><br />
            <input type="text" size="50" name="FirstName" value="Cordelia" />
		</p>
        <p>
        	<label>Last Name*:</label><br />
            <input type="text" size="50" name="LastName" value="Foxx" />
		</p>
        <p>
        	<label>Phone Number*:</label><br />
            <input type="text" size="50" name="Phone" value="(604) 321-1234" />
		</p>
        <p>
        	<label>E-mail Address*:</label><br />
            <input type="text" size="50" name="Email" value="cfoxx@test.com" />
		</p>
        <p>Select a project*:<br />
        	<input type="checkbox" name="ProjectID[]" value="12568" checked />BBH - Cradle Bay</label><br />
            <input type="checkbox" name="ProjectID[]" value="12567" checked />BBH - Silent Hill</label><br />
            <input type="checkbox" name="ProjectID[]" value="3075" />Best Builder Homes OSC</label>
		</p>
        <p>
        	<button id="register" style="font-family:Verdana,sans-serif; font-size:12pt;">SUBMIT</button>
		</p>
	</form>
</td></tr></table>

</script>
</body>
</html>
